# Manually set any version (all three digits). Creates ref and updates pyproject.toml.
# Useful for major/minor bumps before a release.

name: Manual Set Version

on:
  workflow_dispatch:
    inputs:
      major:
        description: Major version
        required: true
        type: number
      minor:
        description: Minor version
        required: true
        type: number
      patch:
        description: Patch version
        required: true
        type: number

jobs:
  set-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build version string
        id: version
        run: |
          V="${{ inputs.major }}.${{ inputs.minor }}.${{ inputs.patch }}"
          echo "new_version=$V" >> $GITHUB_OUTPUT

      - name: Create version ref
        run: |
          git update-ref "refs/version/${{ steps.version.outputs.new_version }}" HEAD
          git push origin "refs/version/${{ steps.version.outputs.new_version }}"

      - name: Update pyproject.toml
        run: |
          V="${{ steps.version.outputs.new_version }}"
          sed -i 's/^version = ".*"/version = "'"$V"'"/' pyproject.toml
          git add pyproject.toml
          git -c user.name="crawler-bot" -c user.email="bot@malaclyde.dev" commit -m "Set version to $V"
          git push
