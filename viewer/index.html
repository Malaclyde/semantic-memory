<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KB Graph Viewer</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: system-ui, sans-serif; }
body { display: flex; }
#graph { flex: 1; height: 100vh; background: #1a1a2e; }
#panel {
    width: 420px; height: 100vh; overflow-y: auto;
    background: #16213e; color: #e0e0e0; padding: 20px;
    border-left: 1px solid #0f3460; display: none;
}
#panel h2 { margin-bottom: 8px; font-size: 18px; color: #e94560; }
#panel .meta { font-size: 13px; color: #888; margin-bottom: 16px; }
#panel .section-title { font-size: 14px; font-weight: 600; margin: 14px 0 8px; color: #aaa; }
#panel .item {
    background: #1a1a3e; border-radius: 6px; padding: 10px 12px; margin-bottom: 6px;
    border-left: 3px solid #0f3460;
}
#panel .item.outdated { border-left-color: #e94560; opacity: 0.6; }
#panel .item .title { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
#panel .item .sub { font-size: 12px; color: #999; }
#panel .desc { font-size: 13px; color: #bbb; line-height: 1.5; margin-top: 4px; }
#placeholder {
    width: 420px; height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #16213e; color: #555; font-size: 15px; border-left: 1px solid #0f3460;
}
</style>
</head>
<body>
<div id="graph"></div>
<div id="placeholder">Click a node to see details</div>
<div id="panel"></div>

<script>
const API = '';

const groups = {
    'chunk': { shape: 'box', color: { background: '#0f3460', border: '#e94560' }, font: { color: '#eee', size: 12 } },
    'chunk-outdated': { shape: 'box', color: { background: '#2a2a3e', border: '#555' }, font: { color: '#777', size: 12 } },
    'concept': { shape: 'ellipse', color: { background: '#1a6b3c', border: '#4ecca3' }, font: { color: '#eee', size: 13, face: 'monospace' } },
};

const options = {
    physics: { solver: 'forceAtlas2Based', forceAtlas2Based: { gravitationalConstant: -80, springLength: 180 } },
    edges: { color: { color: '#0f3460', hover: '#e94560' }, width: 1.5, smooth: false },
    groups,
    interaction: { hover: true, tooltipDelay: 100 },
};

const graph = document.getElementById('graph');
const panel = document.getElementById('panel');
const placeholder = document.getElementById('placeholder');

let network;

fetch(`${API}/api/graph`)
    .then(r => r.json())
    .then(data => {
        const nodes = new vis.DataSet(data.nodes);
        const edges = new vis.DataSet(data.edges);
        const container = graph;
        network = new vis.Network(container, { nodes, edges }, options);

        network.on('click', function(params) {
            if (params.nodes.length === 0) { showPlaceholder(); return; }
            const nodeId = params.nodes[0];
            const node = nodes.get(nodeId);
            if (!node) return;
            const type = node._type;
            const dbId = node._dbId;
            fetch(`${API}/api/node/${type}/${dbId}`)
                .then(r => r.json())
                .then(d => showDetails(type, d, node));
        });

        network.on('hoverNode', function(params) {
            document.body.style.cursor = 'pointer';
        });
        network.on('blurNode', function() {
            document.body.style.cursor = 'default';
        });
    });

function showPlaceholder() {
    placeholder.style.display = 'flex';
    panel.style.display = 'none';
}

function showDetails(type, data, node) {
    placeholder.style.display = 'none';
    panel.style.display = 'block';

    if (type === 'chunk') {
        panel.innerHTML = `
            <h2>Chunk #${data.id}</h2>
            <div class="meta">${data.outdated ? '⛔ OUTDATED' : '✅ Active'}</div>
            <div class="section-title">Text</div>
            <div class="desc">${escapeHtml(data.text)}</div>
            <div class="section-title">Linked Concepts (${data.concepts.length})</div>
            ${data.concepts.map(c => `
                <div class="item" onclick="focusNode('concept-${c.id}')" style="cursor:pointer">
                    <div class="title">${escapeHtml(c.name)}</div>
                    <div class="sub">${c.description ? escapeHtml(c.description) : 'no description'}</div>
                </div>
            `).join('')}
        `;
    } else {
        panel.innerHTML = `
            <h2>${escapeHtml(data.name)}</h2>
            <div class="meta">Concept #${data.id}</div>
            ${data.description ? `<div class="section-title">Description</div><div class="desc">${escapeHtml(data.description)}</div>` : ''}
            <div class="section-title">Linked Chunks (${data.chunks.length})</div>
            ${data.chunks.map(c => `
                <div class="item ${c.outdated ? 'outdated' : ''}" onclick="focusNode('chunk-${c.id}')" style="cursor:pointer">
                    <div class="title">Chunk #${c.id} ${c.outdated ? '(outdated)' : ''}</div>
                    <div class="sub">${escapeHtml(c.text.substring(0, 120))}${c.text.length > 120 ? '...' : ''}</div>
                </div>
            `).join('')}
        `;
    }
}

function focusNode(nodeId) {
    if (network) {
        network.focus(nodeId, { scale: 1.5, animation: true });
        network.selectNodes([nodeId], false);
        // Trigger click to refresh details
        const node = network.body.data.nodes.get(nodeId);
        if (node) {
            const type = node._type;
            const dbId = node._dbId;
            fetch(`${API}/api/node/${type}/${dbId}`)
                .then(r => r.json())
                .then(d => showDetails(type, d, node));
        }
    }
}

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
